name: Deploy Prod (Canary)

# RF08 — Despliegue a produccion con estrategia canary: 10% -> 50% -> 100%,
# ventanas de 5 min, con rollback automatico si el error rate supera 2%
# (monitoreado con Prometheus). Requiere aprobacion (environment: production).
# ESTADO: los pasos de ejecucion estan SIMULADOS (echo) — los comandos az
# reales estan comentados junto a cada paso; ver PIPELINE.md.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  canary:
    runs-on: ubuntu-latest
    environment: production
    strategy:
      matrix:
        fase: [10, 50, 100]
      max-parallel: 1   # las fases corren en orden
    steps:
      - uses: actions/checkout@v4

      # Comando real (requiere azure/login@v2 con secrets.AZURE_CREDENTIALS):
      # az containerapp ingress traffic set -n agentwatch-prod -g agentwatch \
      #   --revision-weight nueva=${{ matrix.fase }}
      - name: Enrutar ${{ matrix.fase }}% del trafico (SIMULADO)
        # (escalar entre comillas: un `: ` dentro de un escalar plano es YAML invalido)
        run: 'echo "Canary: enviando ${{ matrix.fase }}% del trafico a la revision nueva"'

      # Comando real: consultar a Prometheus el error rate de la revision
      # canary durante 5 min y abortar si supera 2%, p. ej.:
      # rate=$(curl -s "$PROM_URL/api/v1/query?query=error_rate{revision='nueva'}" | jq ...)
      # if (( $(echo "$rate > 0.02" | bc -l) )); then exit 1; fi
      - name: Ventana de observacion 5 min + error rate Prometheus (SIMULADO)
        run: |
          echo "Vigilando error_rate por 5 min via Prometheus..."
          echo "Si error_rate > 2% -> exit 1 (dispara rollback)"

      # Comando real:
      # az containerapp ingress traffic set -n agentwatch-prod -g agentwatch \
      #   --revision-weight anterior=100
      # NOTA: con pasos simulados que nunca fallan, este paso es inalcanzable;
      # se vuelve efectivo cuando la ventana de observacion sea real.
      - name: Rollback automatico si la fase fallo (SIMULADO)
        if: failure()
        run: 'echo "Error rate > 2%: revirtiendo trafico a la revision anterior (rollback)"'
