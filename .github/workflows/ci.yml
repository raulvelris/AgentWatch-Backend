name: CI

# RF08 — Todo PR dispara: lint -> tests -> analisis estatico (Semgrep) -> build.
# El merge queda bloqueado si la cobertura del Modulo 2 es < 70% o si hay
# hallazgos Critical/High. (Configurar como required status check en la rama.)
# push a main incluido: un push directo a main (sin PR) antes no corria CI y
# un commit que rompia la suite entera entro sin ninguna alarma (julio 2026).
on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop, main]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff semgrep

      - name: Lint (ruff)
        run: ruff check app tests

      - name: Static analysis (Semgrep)
        # RF08: bloquea ante hallazgos Critical/High.
        run: semgrep --config auto --severity ERROR --error app

      - name: Tests + coverage gate (>= 70% en el Modulo 2)
        # Scope: todo el codigo del Modulo 2 (routers + schemas + persistencia
        # + config + dependencias de auth/reloj/outbox). Medido al ampliarlo:
        # 99% — el gate 70 acordado por el equipo queda con margen.
        run: |
          pytest tests/ \
            --cov=app.routers.deployments \
            --cov=app.routers.versions \
            --cov=app.routers.environments \
            --cov=app.routers.notifications \
            --cov=app.routers.env_vars \
            --cov=app.schemas.version \
            --cov=app.schemas.environment \
            --cov=app.core.config \
            --cov=app.core.database \
            --cov=app.models \
            --cov=app.services.deps \
            --cov=app.services.notificaciones \
            --cov=app.services.reloj \
            --cov=app.services.cifrado_fernet \
            --cov=app.services.governance_service \
            --cov=app.routers.governance \
            --cov-report=term-missing \
            --cov-fail-under=70

      - name: Build image
        run: docker build -t agentwatch-backend:${{ github.sha }} .
