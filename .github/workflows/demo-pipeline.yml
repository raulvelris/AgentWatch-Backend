name: Demo Pipeline (CI)

# Workflow simple para la demo del video: corre lint + tests (rápido y estable).
# Se dispara en CADA push (cualquier rama) y también con el botón manual.
# El pipeline completo está en ci.yml (lint + Semgrep + cobertura + build).
on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (ruff)
        run: ruff check app tests

      - name: Tests (pytest)
        run: pytest tests/
